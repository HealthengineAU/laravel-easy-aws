version: 2.1

executors:
  php82:
    docker:
      - image: cimg/php:8.2
    resource_class: small
  php83:
    docker:
      - image: cimg/php:8.3
    resource_class: small

jobs:
  lint:
    executor: php83
    steps:
      - checkout
      - run: composer update
      - run: composer lint
  test:
    parameters:
      laravel_version:
        type: string
      php_executor:
        type: string
      testbench_version:
        type: string
    executor: << parameters.php_executor >>
    steps:
      - checkout
      - run: composer require --no-update illuminate/cache=^<< parameters.laravel_version >>.0
      - run: composer require --no-update illuminate/contracts=^<< parameters.laravel_version >>.0
      - run: composer require --no-update illuminate/support=^<< parameters.laravel_version >>.0
      - run: composer require --dev --no-update orchestra/testbench=^<< parameters.testbench_version >>.0
      - run: composer update --prefer-lowest
      - run: composer test
      - run: composer update
      - run: composer test
  coverage:
    executor: php83
    steps:
      - run: sudo -E pecl install pcov && sudo -E docker-php-ext-enable pcov
      - checkout
      - run: composer update
      - run: composer coverage

workflows:
  lint_test_coverage:
    jobs:
      - lint
      - test:
          matrix:
            parameters:
              laravel_version: ['12']
              php_executor: [php82, php83]
              testbench_version: ['10']
      - coverage:
          requires:
            - test
